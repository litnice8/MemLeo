<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — MLShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-wrap">
                <a href="index.html" class="logo-link">
    			<div class="logo">MLShop</div>
		</a>
                <nav class="nav-left">
                    <a href="index.html#new">Новое</a>
                    <a href="catalog.html">Электроника</a>
                    <a href="index.html#discounts">Скидки</a>
                </nav>
                <div class="nav-right">
                    <a href="catalog.html">
                        <img src="img/search.png" alt="Поиск" class="icon-search">
                    </a>
                    <a href="cart.html">
                        <img src="img/Heart.png" alt="Избранное">
                    </a>
                    <a href="profile.html">
                        <img src="img/account.png" alt="Профиль" class="icon-profile">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="catalog-title">Каталог товаров</h1>
            
            <div class="catalog-grid" id="catalogGrid">
            </div>
            
            <div class="pagination" id="pagination">
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 MLShop. Все права защищены.</p>
        </div>
    </footer>

    <script>
        const products = [
            { id: 1, name: "Lenovo IdeaPad 3 15IIL05", price: "49 999 ₽", img: "img/len1.jpg" },
            { id: 2, name: "Apple 2024 MacBook Air 15", price: "39 999 ₽", img: "img/ap1.jpg" },
            { id: 3, name: "Apple MacBook Air M2", price: "18 999 ₽", img: "img/ap2.jpg" },
            { id: 4, name: "MacBook Air 13", price: "24 999 ₽", img: "img/ap3.jpg" },
            { id: 5, name: "Apple Watch SE (2nd Gen)", price: "31 999 ₽", img: "img/aw1.jpg" },
            { id: 6, name: "Apple Watch Series 10", price: "45 999 ₽", img: "img/aw2.jpg" },
            { id: 7, name: "Apple Watch SE 3", price: "18 999 ₽", img: "img/aw3.jpg" },
            { id: 8, name: "Motorola Edge 30 Pro", price: "10 000 ₽", img: "img/moto30.jpg" },
            { id: 9, name: "Motorola Moto g24", price: "9 999 ₽", img: "img/motog24.jpg" },
            { id: 10, name: "Samsung Galaxy S25 128GB", price: "11 999 ₽", img: "img/ss25.jpg" },
            { id: 11, name: "Samsung Galaxy S24", price: "10 999 ₽", img: "img/ss24.jpg" },
            { id: 12, name: "Samsung Galaxy S26", price: "15 999 ₽", img: "img/ss26.jpg" },
            { id: 13, name: "Apple iPhone 15", price: "8 999 ₽", img: "img/iP15.jpg" },
            { id: 14, name: "Apple iPhone 16", price: "9 999 ₽", img: "img/iP16.jpg" },
            { id: 15, name: "Apple iPhone 17", price: "14 999 ₽", img: "img/iP17.jpg" },
            { id: 16, name: "Lenovo IdeaPad 3", price: "29 999 ₽", img: "img/len1.jpg" }
        ];

        const productsPerPage = 8;
        let currentPage = 1;
        const totalPages = Math.ceil(products.length / productsPerPage);

        function renderProducts(page) {
            const grid = document.getElementById('catalogGrid');
            if (!grid) return;
            
            const start = (page - 1) * productsPerPage;
            const end = start + productsPerPage;
            const pageProducts = products.slice(start, end);
            
            grid.innerHTML = '';
            
            pageProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                const link = document.createElement('a');
		link.href = `product.html?id=${product.id}`;
		link.className = 'product-link';
		link.innerHTML = `
    			<div class="product-card">
        			<div class="product-image-wrapper">
            				<img src="${product.img}" alt="${product.name}" class="product-image">
        			</div>
        			<h3 class="product-name">${product.name}</h3>
        			<p class="product-price">${product.price}</p>
    			</div>
		`;
		grid.appendChild(link);
            });
        }

        function renderPagination(currentPage) {
            const pagination = document.getElementById('pagination');
            if (!pagination) return;
            
            pagination.innerHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.textContent = i;
                btn.dataset.page = i;
                
                btn.addEventListener('click', function() {
                    const page = parseInt(this.dataset.page);
                    if (page === currentPage) return;
                    
                    currentPage = page;
                    renderProducts(currentPage);
                    renderPagination(currentPage);
                    
                    document.querySelector('.catalog-title').scrollIntoView({ behavior: 'smooth' });
                });
                
                pagination.appendChild(btn);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderProducts(1);
            renderPagination(1);
        });
    </script>
</body>
</html>
