<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — MLShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-wrap">
                <a href="index.html" class="logo-link">
                    <div class="logo">MLShop</div>
                </a>
                <nav class="nav-left">
                    <a href="index.html#new">Новое</a>
                    <a href="catalog.html">Электроника</a>
                    <a href="index.html#discounts">Скидки</a>
                </nav>
                <div class="nav-right">
                    <a href="catalog.html">
                        <img src="img/search.png" alt="Поиск" class="icon-search">
                    </a>
                    <a href="cart.html">
                        <img src="img/Heart.png" alt="Корзина">
                    </a>
                    <a href="profile.html">
                        <img src="img/account.png" alt="Профиль" class="icon-profile">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="profile-title">Личный кабинет</h1>
            
            <div class="profile-wrapper" id="profileWrapper">
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 MLShop. Все права защищены.</p>
        </div>
    </footer>

    <script>
        function getUsers() {
            const data = localStorage.getItem('users');
            return data ? JSON.parse(data) : [];
        }

        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        function getCurrentUser() {
            const data = localStorage.getItem('currentUser');
            return data ? JSON.parse(data) : null;
        }

        function setCurrentUser(user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
        }

        function logoutUser() {
            localStorage.removeItem('currentUser');
        }

        function isLoggedIn() {
            return getCurrentUser() !== null;
        }

        function registerUser(email, password, firstName, lastName) {
            const users = getUsers();
            
            if (users.find(u => u.email === email)) {
                return { success: false, message: 'Пользователь с таким email уже существует.' };
            }
            
            const newUser = {
                id: Date.now(),
                email: email,
                password: password,
                firstName: firstName,
                lastName: lastName,
                registeredAt: new Date().toLocaleDateString('ru-RU')
            };
            
            users.push(newUser);
            saveUsers(users);
            
            setCurrentUser(newUser);
            
            return { success: true, message: 'Регистрация успешна!', user: newUser };
        }

        function loginUser(email, password) {
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password);
            
            if (!user) {
                return { success: false, message: 'Неверный email или пароль.' };
            }
            
            setCurrentUser(user);
            return { success: true, message: 'Вход выполнен!', user: user };
        }

        function renderProfile() {
            const wrapper = document.getElementById('profileWrapper');
            if (!wrapper) return;
            
            const user = getCurrentUser();
            
            if (user) {
                wrapper.innerHTML = `
                    <div class="profile-card">
                        <div class="profile-avatar">
                            <div class="avatar-circle">${user.firstName.charAt(0)}${user.lastName.charAt(0)}</div>
                        </div>
                        <div class="profile-info">
                            <h2 class="profile-name">${user.firstName} ${user.lastName}</h2>
                            <p class="profile-email">📧 ${user.email}</p>
                            <p class="profile-registered">📅 Зарегистрирован: ${user.registeredAt}</p>
                        </div>
                        <div class="profile-actions">
                            <button class="btn-logout" onclick="handleLogout()">Выйти из профиля</button>
                        </div>
                    </div>
                `;
            } else {
                wrapper.innerHTML = `
                    <div class="auth-tabs">
                        <button class="tab-btn active" data-tab="login">Вход</button>
                        <button class="tab-btn" data-tab="register">Регистрация</button>
                    </div>
                    
                    <div class="auth-form" id="loginForm">
                        <h2 class="auth-title">Вход в личный кабинет</h2>
                        <form onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label for="loginEmail">Электронная почта</label>
                                <input type="email" id="loginEmail" placeholder="example@mail.ru" required>
                            </div>
                            <div class="form-group">
                                <label for="loginPassword">Пароль</label>
                                <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                            </div>
                            <button type="submit" class="btn-auth">Войти</button>
                        </form>
                        <p class="auth-switch">Нет аккаунта? <span onclick="switchTab('register')">Зарегистрируйтесь</span></p>
                    </div>
                    
                    <div class="auth-form" id="registerForm" style="display: none;">
                        <h2 class="auth-title">Регистрация</h2>
                        <form onsubmit="handleRegister(event)">
                            <div class="form-group">
                                <label for="regFirstName">Имя</label>
                                <input type="text" id="regFirstName" placeholder="Введите ваше имя" required>
                            </div>
                            <div class="form-group">
                                <label for="regLastName">Фамилия</label>
                                <input type="text" id="regLastName" placeholder="Введите вашу фамилию" required>
                            </div>
                            <div class="form-group">
                                <label for="regEmail">Электронная почта</label>
                                <input type="email" id="regEmail" placeholder="example@mail.ru" required>
                            </div>
                            <div class="form-group">
                                <label for="regPassword">Пароль</label>
                                <input type="password" id="regPassword" placeholder="Придумайте пароль" minlength="6" required>
                            </div>
                            <div class="form-group">
                                <label for="regPasswordConfirm">Подтверждение пароля</label>
                                <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required>
                            </div>
                            <button type="submit" class="btn-auth">Зарегистрироваться</button>
                        </form>
                        <p class="auth-switch">Уже есть аккаунт? <span onclick="switchTab('login')">Войдите</span></p>
                    </div>
                    
                    <div id="authMessage" class="auth-message"></div>
                `;
                
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const tab = this.dataset.tab;
                        switchTab(tab);
                    });
                });
            }
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-btn');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const msg = document.getElementById('authMessage');
            
            if (msg) msg.textContent = '';
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab-btn[data-tab="login"]').classList.add('active');
                if (loginForm) loginForm.style.display = 'block';
                if (registerForm) registerForm.style.display = 'none';
            } else {
                document.querySelector('.tab-btn[data-tab="register"]').classList.add('active');
                if (loginForm) loginForm.style.display = 'none';
                if (registerForm) registerForm.style.display = 'block';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            const result = loginUser(email, password);
            const msg = document.getElementById('authMessage');
            
            if (result.success) {
                msg.style.color = '#28a745';
                msg.textContent = '✅ ' + result.message;
                setTimeout(() => {
                    renderProfile();
                }, 500);
            } else {
                msg.style.color = '#dc3545';
                msg.textContent = '❌ ' + result.message;
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            
            const firstName = document.getElementById('regFirstName').value.trim();
            const lastName = document.getElementById('regLastName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();
            
            const msg = document.getElementById('authMessage');
            
            if (!firstName || !lastName) {
                msg.style.color = '#dc3545';
                msg.textContent = '❌ Пожалуйста, введите имя и фамилию.';
                return;
            }
            
            if (password !== confirm) {
                msg.style.color = '#dc3545';
                msg.textContent = '❌ Пароли не совпадают.';
                return;
            }
            
            if (password.length < 6) {
                msg.style.color = '#dc3545';
                msg.textContent = '❌ Пароль должен содержать минимум 6 символов.';
                return;
            }
            
            const result = registerUser(email, password, firstName, lastName);
            
            if (result.success) {
                msg.style.color = '#28a745';
                msg.textContent = '✅ ' + result.message;
                setTimeout(() => {
                    renderProfile();
                }, 500);
            } else {
                msg.style.color = '#dc3545';
                msg.textContent = '❌ ' + result.message;
            }
        }

        function handleLogout() {
            if (confirm('Вы уверены, что хотите выйти из профиля?')) {
                logoutUser();
                renderProfile();
            }
        }

        document.addEventListener('DOMContentLoaded', renderProfile);
    </script>
</body>
</html>
