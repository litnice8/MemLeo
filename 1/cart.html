<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — MLShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-wrap">
                <a href="index.html" class="logo-link">
                    <div class="logo">MLShop</div>
                </a>
                <nav class="nav-left">
                    <a href="index.html#new">Новое</a>
                    <a href="catalog.html">Электроника</a>
                    <a href="index.html#discounts">Скидки</a>
                </nav>
                <div class="nav-right">
                    <a href="catalog.html">
                        <img src="img/search.png" alt="Поиск" class="icon-search">
                    </a>
                    <a href="cart.html">
                        <img src="img/Heart.png" alt="Корзина">
                    </a>
                    <a href="profile.html">
                        <img src="img/account.png" alt="Профиль" class="icon-profile">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="cart-title">Корзина</h1>
            
            <div class="cart-wrapper">
                <div class="cart-items" id="cartItems">
                </div>
                
                <div class="cart-summary">
                    <h2 class="summary-title">Итого</h2>
                    <div class="summary-row">
                        <span>Товаров:</span>
                        <span id="totalItems">0</span>
                    </div>
                    <div class="summary-row total-price">
                        <span>Сумма:</span>
                        <span id="totalPrice">0 ₽</span>
                    </div>
                    <a href="checkout.html" class="btn-checkout">Оплатить заказ</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 MLShop. Все права защищены.</p>
        </div>
    </footer>

    <script>
        const products = [
            { id: 1, name: "Lenovo IdeaPad 3 15IIL05", price: 49999, img: "img/len1.jpg" },
            { id: 2, name: "Apple 2024 MacBook Air 15", price: 39999, img: "img/ap1.jpg" },
            { id: 3, name: "Apple MacBook Air M2", price: 18999, img: "img/ap2.jpg" },
            { id: 4, name: "MacBook Air 13", price: 24999, img: "img/ap3.jpg" },
            { id: 5, name: "Apple Watch SE (2nd Gen)", price: 31999, img: "img/aw1.jpg" },
            { id: 6, name: "Apple Watch Series 10", price: 45999, img: "img/aw2.jpg" },
            { id: 7, name: "Apple Watch SE 3", price: 18999, img: "img/aw3.jpg" },
            { id: 8, name: "Motorola Edge 30 Pro", price: 10000, img: "img/moto30.jpg" },
            { id: 9, name: "Motorola Moto g24", price: 9999, img: "img/motog24.jpg" },
            { id: 10, name: "Samsung Galaxy S25 128GB", price: 11999, img: "img/ss25.jpg" },
            { id: 11, name: "Samsung Galaxy S24", price: 10999, img: "img/ss24.jpg" },
            { id: 12, name: "Samsung Galaxy S26", price: 15999, img: "img/ss26.jpg" },
            { id: 13, name: "Apple iPhone 15", price: 8999, img: "img/iP15.jpg" },
            { id: 14, name: "Apple iPhone 16", price: 9999, img: "img/iP16.jpg" },
            { id: 15, name: "Apple iPhone 17", price: 14999, img: "img/iP17.jpg" },
            { id: 16, name: "Lenovo IdeaPad 3", price: 29999, img: "img/len1.jpg" }
        ];

        function getCart() {
            const cartData = localStorage.getItem('cart');
            return cartData ? JSON.parse(cartData) : [];
        }

        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function getProductById(id) {
            return products.find(p => p.id === id);
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const totalItemsEl = document.getElementById('totalItems');
            const totalPriceEl = document.getElementById('totalPrice');
            
            if (!container) return;
            
            const cart = getCart();
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <p>🛒 Ваша корзина пуста</p>
                        <a href="catalog.html" class="btn-empty-cart">Перейти в каталог</a>
                    </div>
                `;
                totalItemsEl.textContent = '0';
                totalPriceEl.textContent = '0 ₽';
                return;
            }
            
            let html = '';
            let totalItems = 0;
            let totalPrice = 0;
            
            cart.forEach(cartItem => {
                const product = getProductById(cartItem.id);
                if (!product) return;
                
                const itemTotal = product.price * cartItem.quantity;
                totalItems += cartItem.quantity;
                totalPrice += itemTotal;
                
                html += `
                    <div class="cart-item" data-id="${product.id}">
                        <div class="cart-item-image">
                            <img src="${product.img}" alt="${product.name}">
                        </div>
                        <div class="cart-item-info">
                            <h3 class="cart-item-name">${product.name}</h3>
                            <p class="cart-item-price">${product.price.toLocaleString()} ₽ / шт.</p>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="qty-btn minus" data-id="${product.id}">−</button>
                            <span class="qty-value">${cartItem.quantity}</span>
                            <button class="qty-btn plus" data-id="${product.id}">+</button>
                        </div>
                        <div class="cart-item-total">
                            ${itemTotal.toLocaleString()} ₽
                        </div>
                        <button class="cart-item-remove" data-id="${product.id}">✕</button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            totalItemsEl.textContent = totalItems;
            totalPriceEl.textContent = totalPrice.toLocaleString() + ' ₽';
            
            document.querySelectorAll('.qty-btn.plus').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const cart = getCart();
                    const item = cart.find(c => c.id === id);
                    if (item) {
                        item.quantity++;
                        saveCart(cart);
                        renderCart();
                    }
                });
            });
            
            document.querySelectorAll('.qty-btn.minus').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    let cart = getCart();
                    const item = cart.find(c => c.id === id);
                    if (item) {
                        item.quantity--;
                        if (item.quantity <= 0) {
                            cart = cart.filter(c => c.id !== id);
                        }
                        saveCart(cart);
                        renderCart();
                    }
                });
            });
            
            document.querySelectorAll('.cart-item-remove').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    let cart = getCart();
                    cart = cart.filter(c => c.id !== id);
                    saveCart(cart);
                    renderCart();
                });
            });
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
